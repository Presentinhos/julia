<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Para Júlia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1a1320;
      --surface: #221829;
      --gold: #c9a6d4;
      --gold-light: #e0c4ea;
      --text: #f0e8f5;
      --text-muted: #9a7faa;
      --accent: #d4a6c0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { background: var(--bg); }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem 3rem;
      overflow-x: hidden;
      position: relative;
      -webkit-user-select: none;
      user-select: none;
    }

    html::before, body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(180,140,210,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(210,140,180,0.10) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Girassóis decorativos */
    .sunflower {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      opacity: 0.13;
      font-size: 3rem;
      animation: floatSun 6s ease-in-out infinite;
    }
    .sunflower:nth-child(1) { top: 4%; left: 5%;  font-size: 2.4rem; animation-delay: 0s; }
    .sunflower:nth-child(2) { top: 8%; right: 8%; font-size: 3rem;   animation-delay: 1s; }
    .sunflower:nth-child(3) { top: 40%; left: 2%; font-size: 2rem;   animation-delay: 2s; }
    .sunflower:nth-child(4) { bottom: 20%; right: 4%; font-size: 2.8rem; animation-delay: 0.5s; }
    .sunflower:nth-child(5) { bottom: 6%; left: 10%; font-size: 2.2rem; animation-delay: 1.5s; }
    .sunflower:nth-child(6) { top: 65%; right: 6%; font-size: 1.8rem; animation-delay: 3s; }

    @keyframes floatSun {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50%       { transform: translateY(-8px) rotate(5deg); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
    }

    .header {
      text-align: center;
      animation: fadeUp 1s ease both;
    }

    .greeting {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 1rem;
      color: var(--gold);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    .name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 3.2rem;
      line-height: 1;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .present-wrapper {
      animation: fadeUp 1s 0.2s ease both;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .present-btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .present-icon {
      width: 90px;
      height: 90px;
      position: relative;
      transition: transform 0.3s ease;
      filter: drop-shadow(0 0 20px rgba(180,140,210,0.4));
      animation: float 3s ease-in-out infinite;
    }

    .present-btn:active .present-icon { transform: scale(0.92); }

    .present-hint {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* Modal base */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(20,15,28,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 2rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .modal-overlay.active { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border: 1px solid rgba(180,140,210,0.25);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 340px;
      width: 100%;
      transform: translateY(20px) scale(0.97);
      transition: transform 0.4s ease;
      box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(180,140,210,0.05);
    }

    .modal-overlay.active .modal { transform: translateY(0) scale(1); }

    .modal-emoji { font-size: 2.5rem; margin-bottom: 1rem; display: block; }

    .modal-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.5rem;
      color: var(--gold-light);
      margin-bottom: 1rem;
      font-weight: 300;
    }

    .modal-text {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }

    .countdown {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 1.8rem;
    }

    .count-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
    }

    .count-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem;
      font-weight: 300;
      color: var(--gold);
      line-height: 1;
    }

    .count-label {
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .count-sep {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      color: var(--text-muted);
      align-self: flex-start;
      margin-top: 0.1rem;
    }

    .modal-close {
      background: rgba(180,140,210,0.1);
      border: 1px solid rgba(180,140,210,0.25);
      color: var(--gold);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.75rem 2rem;
      border-radius: 100px;
      cursor: pointer;
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .modal-close:active { background: rgba(180,140,210,0.2); }

    /* ── Modal de senha (dia 18) ── */
    .password-input-wrap {
      position: relative;
      margin-bottom: 1.2rem;
    }

    .password-input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(180,140,210,0.3);
      border-radius: 12px;
      padding: 0.85rem 1.2rem;
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      text-align: center;
      letter-spacing: 0.2em;
      outline: none;
      transition: border-color 0.2s;
      -webkit-user-select: auto;
      user-select: auto;
    }

    .password-input:focus {
      border-color: rgba(180,140,210,0.7);
    }

    .password-input.error {
      border-color: rgba(220, 100, 120, 0.7);
      animation: shake 0.4s ease;
    }

    .password-error {
      font-size: 0.75rem;
      color: rgba(220, 100, 120, 0.9);
      margin-top: 0.5rem;
      display: none;
    }

    .password-error.visible { display: block; }

    .password-submit {
      background: rgba(180,140,210,0.15);
      border: 1px solid rgba(180,140,210,0.35);
      color: var(--gold-light);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.8rem 2.2rem;
      border-radius: 100px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      width: 100%;
    }

    .password-submit:active {
      background: rgba(180,140,210,0.28);
      transform: scale(0.97);
    }

    .password-hint {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 0.9rem;
      line-height: 1.6;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    /* Phrases */
    .phrases {
      animation: fadeUp 1s 0.4s ease both;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
    }

    .phrase {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 1.4rem 1.5rem;
    }

    .phrase-words {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      line-height: 1.8;
      font-weight: 300;
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
    }

    .word {
      display: inline-block;
      transition: filter 0.8s ease, color 0.8s ease;
    }

    .word.revealed { color: var(--text); filter: none; }

    .word.blurred {
      color: rgba(240,232,245,0.08);
      filter: blur(5px);
      user-select: none;
      -webkit-user-select: none;
      pointer-events: none;
    }

    /* Day progress */
    .day-info {
      text-align: center;
      animation: fadeUp 1s 0.5s ease both;
    }

    .day-text {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
    }

    .day-progress {
      margin-top: 0.8rem;
      height: 2px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
      width: 100%;
    }

    .day-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      border-radius: 2px;
      transition: width 1s ease;
    }

    /* Buttons */
    .quiz-btn {
      animation: fadeUp 1s 0.6s ease both;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: none;
      border: 1px solid rgba(180,140,210,0.25);
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.75rem 1.8rem;
      border-radius: 100px;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .quiz-btn:active {
      border-color: rgba(180,140,210,0.6);
      color: var(--gold);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-6px); }
    }
  </style>
</head>
<body>

<!-- Girassóis -->
<div class="sunflower">🌻</div>
<div class="sunflower">🌻</div>
<div class="sunflower">🌻</div>
<div class="sunflower">🌻</div>
<div class="sunflower">🌻</div>
<div class="sunflower">🌻</div>

<div class="container">

  <div class="header">
    <p class="greeting">para você,</p>
    <h1 class="name">Júlia</h1>
  </div>

  <div class="phrases">
    <div class="phrase" id="phrase1-box">
      <div class="phrase-words" id="phrase1"></div>
    </div>
    <div class="phrase" id="phrase2-box">
      <div class="phrase-words" id="phrase2"></div>
    </div>
  </div>

  <div class="day-info" style="width:100%">
    <p class="day-text" id="dayText"></p>
    <div class="day-progress">
      <div class="day-fill" id="dayFill"></div>
    </div>
  </div>

  <div style="display:flex;gap:0.75rem;width:100%;justify-content:center;">
    <a class="quiz-btn" href="message.html">✦ final</a>
  </div>

</div>

<!-- Modal: contagem regressiva (antes do dia 18) -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <span class="modal-emoji">🔒</span>
    <h2 class="modal-title">Ainda não, meu bem</h2>
    <p class="modal-text">Este presente só poderá ser aberto no dia do seu aniversário.<br>Aguarda um pouquinho...<br>(Tá como esse "frio" da europa em?)</p>
    <div class="countdown" id="countdown"></div>
    <button class="modal-close" onclick="closeModal()">tudo bem ♡</button>
  </div>
</div>

<!-- Modal: senha (dia 18) -->
<div class="modal-overlay" id="modalPassword" onclick="closePasswordOutside(event)">
  <div class="modal">
    <span class="modal-emoji">🎁</span>
    <h2 class="modal-title">Chegou o dia!</h2>
    <p class="modal-text" style="margin-bottom:1.4rem;">
      Qual a senha em?
    </p>
    <div class="password-input-wrap">
      <input
        class="password-input"
        id="passwordInput"
        type="text"
        placeholder="sua resposta..."
        autocomplete="off"
        autocorrect="off"
        autocapitalize="none"
        spellcheck="false"
        onkeydown="if(event.key==='Enter') checkPassword()"
      />
      <p class="password-error" id="passwordError">nah</p>
    </div>
    <button class="password-submit" onclick="checkPassword()">abrir ♡</button>
  </div>
</div>

<script>
  const START_DATE  = new Date('2026-06-01T00:00:00');
  const TARGET_DATE = new Date('2026-06-18T00:00:00');
  const CORRECT_PASSWORD = 'girassol';

  const PHRASE1_WORDS = ['Absolutamente', 'do', 'nada,', 'apareceu', 'alguém', 'que', 'se', 'propôs', 'a', 'ficar.'];
  const PHRASE2_WORDS = ['Essa', 'pessoa', 'me', 'ensina', 'o', 'que', 'é', 'amar.'];

  function getDayNumber() {
    const now = new Date();
    const start = new Date(START_DATE);
    start.setHours(0,0,0,0);
    const today = new Date(now);
    today.setHours(0,0,0,0);
    const diff = Math.floor((today - start) / 86400000) + 1;
    return Math.max(1, Math.min(diff, 18));
  }

  function isBirthday() {
    const now = new Date();
    return now >= TARGET_DATE;
  }

  function renderPhrases(day) {
    const p1 = document.getElementById('phrase1');
    const p2 = document.getElementById('phrase2');
    PHRASE1_WORDS.forEach((word, i) => {
      const span = document.createElement('span');
      span.className = 'word ' + (day >= i + 1 ? 'revealed' : 'blurred');
      span.textContent = word;
      p1.appendChild(span);
    });
    PHRASE2_WORDS.forEach((word, i) => {
      const span = document.createElement('span');
      const revealDay = 11 + i;
      span.className = 'word ' + (day >= revealDay ? 'revealed' : 'blurred');
      span.textContent = word;
      p2.appendChild(span);
    });
  }

  function renderDayInfo(day) {
    const el = document.getElementById('dayText');
    const fill = document.getElementById('dayFill');
    el.textContent = `dia ${day} de 18`;
    fill.style.width = `${(day / 18) * 100}%`;
  }

  function updateCountdown() {
    const now = new Date();
    const diff = TARGET_DATE - now;
    if (diff <= 0) {
      document.getElementById('countdown').innerHTML = `<span style="font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--gold)">Chegou o dia! 🎉</span>`;
      return;
    }
    const days    = Math.floor(diff / 86400000);
    const hours   = Math.floor((diff % 86400000) / 3600000);
    const minutes = Math.floor((diff % 3600000) / 60000);
    document.getElementById('countdown').innerHTML = `
      <div class="count-block"><span class="count-num">${days}</span><span class="count-label">dias</span></div>
      <span class="count-sep">·</span>
      <div class="count-block"><span class="count-num">${String(hours).padStart(2,'0')}</span><span class="count-label">horas</span></div>
      <span class="count-sep">·</span>
      <div class="count-block"><span class="count-num">${String(minutes).padStart(2,'0')}</span><span class="count-label">min</span></div>
    `;
  }

  function openModal() {
    if (isBirthday()) {
      // Dia 18: abre modal de senha
      document.getElementById('modalPassword').classList.add('active');
      setTimeout(() => document.getElementById('passwordInput').focus(), 400);
    } else {
      // Antes do dia 18: abre contagem regressiva
      updateCountdown();
      document.getElementById('modalOverlay').classList.add('active');
    }
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
  }

  function closeModalOutside(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  function closePasswordOutside(e) {
    if (e.target === document.getElementById('modalPassword')) {
      document.getElementById('modalPassword').classList.remove('active');
    }
  }

  function checkPassword() {
    const input = document.getElementById('passwordInput');
    const errorEl = document.getElementById('passwordError');
    const val = input.value.trim().toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, ''); // remove acentos

    const correctNorm = CORRECT_PASSWORD
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '');

    if (val === correctNorm) {
      // Certa! Vai para a página final
      input.classList.remove('error');
      errorEl.classList.remove('visible');
      document.getElementById('modalPassword').style.opacity = '0';
      setTimeout(() => { window.location.href = 'final.html'; }, 300);
    } else {
      // Errada
      input.classList.add('error');
      errorEl.classList.add('visible');
      input.value = '';
      setTimeout(() => input.classList.remove('error'), 500);
    }
  }

  const day = getDayNumber();
  renderPhrases(day);
  renderDayInfo(day);

  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('selectstart', e => e.preventDefault());
</script>
</body>
</html>
