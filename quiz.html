<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Quiz ✦</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0b0f;
      --surface: #141118;
      --gold: #c9a96e;
      --gold-light: #e8c98a;
      --text: #f0e8dd;
      --text-muted: #7a6e64;
      --red: #c96e6e;
      --green: #6ec98a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { background: var(--bg); }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem 3rem;
      overflow-x: hidden;
      position: relative;
      -webkit-user-select: none;
      user-select: none;
    }

    html::before, body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(201,169,110,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(180,100,80,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    /* Header */
    .header {
      text-align: center;
      animation: fadeUp 0.8s ease both;
    }

    .label {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--gold);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Progress */
    .progress-row {
      width: 100%;
      display: flex;
      gap: 0.4rem;
      animation: fadeUp 0.8s 0.1s ease both;
    }

    .progress-dot {
      flex: 1;
      height: 3px;
      border-radius: 3px;
      background: rgba(255,255,255,0.06);
      transition: background 0.4s ease;
    }

    .progress-dot.done {
      background: var(--gold);
    }

    .progress-dot.current {
      background: rgba(201,169,110,0.4);
    }

    /* Question card */
    .question-card {
      width: 100%;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 2rem 1.5rem;
      animation: fadeUp 0.8s 0.15s ease both;
    }

    .question-num {
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.8rem;
    }

    .question-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 300;
      line-height: 1.4;
      color: var(--text);
    }

    /* Options */
    .options {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      animation: fadeUp 0.8s 0.25s ease both;
    }

    .option-btn {
      width: 100%;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 1rem 1.25rem;
      text-align: left;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .option-letter {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: var(--text-muted);
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .option-btn:active {
      border-color: rgba(201,169,110,0.4);
      background: rgba(201,169,110,0.05);
    }

    .option-btn.correct {
      border-color: var(--green);
      background: rgba(110,201,138,0.08);
    }

    .option-btn.correct .option-letter {
      background: var(--green);
      border-color: var(--green);
      color: var(--bg);
    }

    .option-btn.wrong {
      border-color: var(--red);
      background: rgba(201,110,110,0.08);
    }

    .option-btn.wrong .option-letter {
      background: var(--red);
      border-color: var(--red);
      color: var(--bg);
    }

    .option-btn:disabled {
      cursor: default;
    }

    /* Feedback */
    .feedback {
      width: 100%;
      border-radius: 14px;
      padding: 1.2rem 1.5rem;
      text-align: center;
      display: none;
      animation: fadeUp 0.5s ease both;
    }

    .feedback.correct {
      background: rgba(110,201,138,0.08);
      border: 1px solid rgba(110,201,138,0.25);
    }

    .feedback.wrong {
      background: rgba(201,110,110,0.08);
      border: 1px solid rgba(201,110,110,0.25);
    }

    .feedback-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.2rem;
      margin-bottom: 0.3rem;
    }

    .feedback.correct .feedback-title { color: var(--green); }
    .feedback.wrong .feedback-title { color: var(--red); }

    .feedback-text {
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* Next button */
    .next-btn {
      background: rgba(201,169,110,0.1);
      border: 1px solid rgba(201,169,110,0.25);
      color: var(--gold);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.75rem 2rem;
      border-radius: 100px;
      cursor: pointer;
      display: none;
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .next-btn:active { background: rgba(201,169,110,0.2); }

    /* Blocked screen */
    .blocked {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      animation: fadeUp 0.8s ease both;
    }

    .blocked-emoji { font-size: 2.5rem; }

    .blocked-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.6rem;
      color: var(--red);
      font-weight: 300;
    }

    .blocked-text {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.7;
      max-width: 280px;
    }

    .blocked-countdown {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      color: var(--gold);
    }

    /* Finished screen */
    .finished {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      animation: fadeUp 0.8s ease both;
    }

    .finished-emoji { font-size: 2.5rem; }

    .finished-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.8rem;
      color: var(--gold-light);
      font-weight: 300;
    }

    .finished-text {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.7;
      max-width: 280px;
    }

    /* Back link */
    .back-link {
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="container" id="app"></div>

<!--
<button onclick="localStorage.removeItem('julia_quiz');location.reload()" style="position:fixed;bottom:1rem;right:1rem;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#555;font-size:0.65rem;padding:0.4rem 0.8rem;border-radius:100px;cursor:pointer;">reset</button>
-->

<script>
  // ══════════════════════════════════════════════════════
  // PERGUNTAS — edite aqui para adicionar ou modificar
  // Cada pergunta tem:
  //   question: o texto da pergunta
  //   options:  array com exatamente 3 alternativas
  //   correct:  índice da resposta certa (0 = primeira, 1 = segunda, 2 = terceira)
  // ══════════════════════════════════════════════════════
  const QUESTIONS = [
    {
      question: "(Vamos ver se tu me conhece mesmo, garota) <br><br> Qual a cor favorita do Bernardo?",
      options: ["Azul", "Verde", "Preto"],
      correct: 1,  // "Verde" é a correta (índice 1)
      feedback: "Se tu erra essa eu fico até bolado"
    },
    {
      question: "O Ber tem quantos irmãos?",
      options: ["2", "1", "3"],
      correct: 0,  // "2" é a correta (índice 0)
      feedback: "Tem q saber até o nome deles kkkkk"
    },
    {
      question: "Qual é o nome do melhor amigo (vidinho KKKKK) do Ber?",
      options: ["Raíke", "José", "Douglas"],
      correct: 2,  // "Douglas" é a correta (índice 2)
      feedback: "Começou a complicar"
    },
    {
      question: "Qual é o apelido que o Bê mais gosta de usar contigo?",
      options: ["Meu bem", "Linda", "Garota"],
      correct: 0,
      feedback: "Achei q tu ia errar essa"
    },
    {
      question: "Qual é o filme favorito do Be (uma das nossas primeiras conversas, essa eu quero ver)",
      options: ["Como eu era antes de você", "Star Wars III", "Star Wars VI"],
      correct: 1,
      feedback: "Tu é braba, garota!"
    },
  ];
  // ══════════════════════════════════════════════════════

  const STORAGE_KEY = 'julia_quiz';
  const LETTERS = ['A', 'B', 'C'];

  function getState() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { progress: 0, blockedUntil: null };
    } catch { return { progress: 0, blockedUntil: null }; }
  }

  function saveState(state) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  }

  function isBlocked(state) {
    return state.blockedUntil && state.blockedUntil === todayStr();
  }

  function timeUntilMidnight() {
    const now = new Date();
    const midnight = new Date(now);
    midnight.setHours(24, 0, 0, 0);
    const diff = midnight - now;
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    return `${h}h ${m}min`;
  }

  function render() {
    const app = document.getElementById('app');
    const state = getState();

    // Back link sempre presente
    const backHTML = `<a class="back-link" href="index.html">← voltar</a>`;

    // Bloqueada
    if (isBlocked(state)) {
      app.innerHTML = `
        ${backHTML}
        <div class="blocked">
          <span class="blocked-emoji">🔒</span>
          <h2 class="blocked-title">Errou, meu bem</h2>
          <p class="blocked-text">Você vai ter que esperar até amanhã para tentar de novo. Era pra saber essa heim...</p>
          <p class="blocked-countdown">volta em ${timeUntilMidnight()}</p>
        </div>
      `;
      return;
    }

    // Finalizado
    if (state.progress >= QUESTIONS.length) {
      app.innerHTML = `
        ${backHTML}
        <div class="finished">
          <span class="finished-emoji">🌻</span>
          <h2 class="finished-title">Você é atenciosa mesmo 😊</h2>
          <p class="finished-text">Acertou tudo. Me manda print dessa tela no zap que te dou um presente...</p>
        </div>
      `;
      return;
    }

    // Pergunta atual
    const q = QUESTIONS[state.progress];
    const progressDots = QUESTIONS.map((_, i) => {
      let cls = i < state.progress ? 'done' : i === state.progress ? 'current' : '';
      return `<div class="progress-dot ${cls}"></div>`;
    }).join('');

    app.innerHTML = `
      ${backHTML}
      <div class="header"><p class="label">quiz</p></div>
      <div class="progress-row">${progressDots}</div>
      <div class="question-card">
        <p class="question-num">pergunta ${state.progress + 1} de ${QUESTIONS.length}</p>
        <p class="question-text">${q.question}</p>
      </div>
      <div class="options" id="options">
        ${q.options.map((opt, i) => `
          <button class="option-btn" onclick="answer(${i})">
            <span class="option-letter">${LETTERS[i]}</span>
            ${opt}
          </button>
        `).join('')}
      </div>
      <div class="feedback" id="feedback">
        <p class="feedback-title" id="feedback-title"></p>
        <p class="feedback-text" id="feedback-text"></p>
      </div>
      <button class="next-btn" id="next-btn" onclick="next()">
        próxima →
      </button>
    `;
  }

  function answer(index) {
    const state = getState();
    const q = QUESTIONS[state.progress];
    const btns = document.querySelectorAll('.option-btn');
    const feedback = document.getElementById('feedback');
    const feedbackTitle = document.getElementById('feedback-title');
    const feedbackText = document.getElementById('feedback-text');
    const nextBtn = document.getElementById('next-btn');

    btns.forEach(b => b.disabled = true);

    if (index === q.correct) {
      btns[index].classList.add('correct');
      feedback.classList.add('correct');
      feedback.style.display = 'block';
      feedbackTitle.textContent = 'Acertou! ✦';
      feedbackText.textContent = q.feedback;
      nextBtn.style.display = 'block';

      state.progress += 1;
      saveState(state);
    } else {
      btns[index].classList.add('wrong');
      btns[q.correct].classList.add('correct');
      feedback.classList.add('wrong');
      feedback.style.display = 'block';
      feedbackTitle.textContent = 'Errou...';
      feedbackText.textContent = 'Vai ter que esperar até amanhã para tentar de novo.';

      // Cancela o bloqueio de estado 
      
      state.blockedUntil = todayStr();
      saveState(state);

      setTimeout(() => render(), 2000);
    }
  }

  function next() {
    render();
  }

  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('selectstart', e => e.preventDefault());

  render();
</script>
</body>
</html>
